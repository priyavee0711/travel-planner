<!DOCTYPE html>
<html>
<head>

  <title>Edit Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet"
  href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

  <h2>Edit Profile</h2>

  <form method="POST">

    <input
      type="text"
      name="username"
      value="{{ username }}"
      placeholder="Enter Username"
      required
    >

    <button
      type="submit"
      class="main-btn"
    >

      Save Changes

    </button>

  </form>

</div>

</body>
</html>
